{% extends "base.html" %}
{% block title %}添加项目 — TODO Dashboard{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm text-center p-5" style="border-radius:16px;">
            <i class="bi bi-folder-plus" style="font-size:4rem;color:#ccc;"></i>
            <h4 class="mt-3">还没有项目</h4>
            <p class="text-muted">添加一个项目目录来开始管理任务</p>
            <div class="input-group mt-3">
                <input type="text" class="form-control" id="init-project-path" placeholder="/path/to/your/project">
                <button class="btn btn-success" onclick="addFirstProject()"><i class="bi bi-plus-lg"></i> 添加项目</button>
            </div>
            <small class="text-muted mt-2 d-block">项目目录应包含 .git/ 或 .claude/ 目录</small>
        </div>
    </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>
async function addFirstProject(){
    const path=document.getElementById('init-project-path').value.trim();
    if(!path)return;
    const r=await(await fetch('/api/projects',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path})})).json();
    if(r.ok)window.location.href='/?p='+r.slug;
    else alert(r.error||'添加失败');
}
document.getElementById('init-project-path').addEventListener('keydown',e=>{if(e.key==='Enter')addFirstProject()});
</script>
{% endblock %}
